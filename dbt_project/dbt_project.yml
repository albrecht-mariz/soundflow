name: soundflow
version: "1.0.0"
config-version: 2

flags:
  warn_error_options:
    silence:
      - MissingArgumentsPropertyInGenericTestDeprecation

profile: soundflow

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  soundflow:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
