version: 2

sources:
  - name: raw
    description: Raw data loaded by dlt from the SoundFlow mock API
    schema: raw
    tables:
      - name: artists
        description: Music artist catalog
        columns:
          - name: artist_id
            description: Unique artist identifier
            data_tests: [unique, not_null]
          - name: name
            data_tests: [not_null]

      - name: albums
        description: Album catalog
        columns:
          - name: album_id
            data_tests: [unique, not_null]
          - name: artist_id
            data_tests: [not_null]

      - name: tracks
        description: Track catalog
        columns:
          - name: track_id
            data_tests: [unique, not_null]
          - name: artist_id
            data_tests: [not_null]

      - name: users
        description: User accounts
        columns:
          - name: user_id
            data_tests: [unique, not_null]
          - name: subscription_type
            data_tests:
              - accepted_values:
                  values: ["free", "premium", "family", "student"]

      - name: stream_events
        description: Individual track streaming events
        columns:
          - name: event_id
            data_tests: [unique, not_null]
          - name: user_id
            data_tests: [not_null]
          - name: track_id
            data_tests: [not_null]
          - name: started_at
            data_tests: [not_null]
