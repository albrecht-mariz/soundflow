version: "3.9"

services:
  mock_api:
    build:
      context: ./mock_api
    container_name: soundflow_mock_api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  pipeline:
    build:
      context: ./pipeline
    container_name: soundflow_pipeline
    depends_on:
      mock_api:
        condition: service_healthy
    environment:
      SOUNDFLOW_API_URL: "http://mock_api:8000"
      DUCKDB_PATH: "/data/soundflow.duckdb"
    volumes:
      - ./data:/data
    command: python pipeline.py

  dbt:
    image: python:3.12-slim
    container_name: soundflow_dbt
    depends_on:
      - pipeline
    working_dir: /dbt
    environment:
      DUCKDB_PATH: "/data/soundflow.duckdb"
    volumes:
      - ./dbt_project:/dbt
      - ./data:/data
    command: >
      bash -c "pip install -r requirements.txt -q &&
               dbt deps &&
               dbt run --target prod --profiles-dir . &&
               dbt test --target prod --profiles-dir ."

  # ── Lightdash BI (Phase 1) ──────────────────────────────────────────────────
  # Self-hosted Lightdash (open-source / free).
  # Lightdash Cloud cannot access a local DuckDB file — use this self-hosted
  # setup instead. Requires the DuckDB file to exist at ./data/soundflow.duckdb
  # (run `make backfill` + `make dbt` first, or `make docker-up` once).
  #
  # Start: docker-compose up lightdash-db lightdash
  # Open:  http://localhost:8090
  # Note:  Do not run the pipeline and Lightdash simultaneously against the
  #        same DuckDB file — DuckDB supports only one writer at a time.
  # ─────────────────────────────────────────────────────────────────────────────
  lightdash-db:
    image: postgres:14
    container_name: soundflow_lightdash_db
    environment:
      POSTGRES_DB: lightdash
      POSTGRES_USER: lightdash
      # Override via .env file: LIGHTDASH_POSTGRES_PASSWORD=<your-password>
      POSTGRES_PASSWORD: ${LIGHTDASH_POSTGRES_PASSWORD:-lightdash_dev}
    volumes:
      - lightdash_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightdash"]
      interval: 5s
      timeout: 5s
      retries: 10

  lightdash:
    image: lightdash/lightdash:latest
    container_name: soundflow_lightdash
    depends_on:
      lightdash-db:
        condition: service_healthy
    environment:
      # Lightdash metadata store (Postgres)
      PGHOST: lightdash-db
      PGPORT: "5432"
      PGUSER: lightdash
      PGPASSWORD: ${LIGHTDASH_POSTGRES_PASSWORD:-lightdash_dev}
      PGDATABASE: lightdash
      # App settings — override LIGHTDASH_SECRET in production
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET:-dev_secret_change_in_prod}
      SECURE_COOKIES: "false"
      TRUST_PROXY: "false"
      PORT: "8090"
      SITE_URL: "http://localhost:8090"
      # dbt project path inside the container
      DBT_PROJECT_DIR: /usr/app/dbt
      # DuckDB file path — must match the mounted volume below
      DUCKDB_PATH: /data/soundflow.duckdb
    ports:
      - "8090:8090"      # 8080 is reserved for `make dbt-docs`
    volumes:
      - ./dbt_project:/usr/app/dbt:ro
      - ./data:/data:ro  # DuckDB file (read-only — pipeline must not run concurrently)

  # ── Slack BI Bot (Phase 3 + 4) ────────────────────────────────────────────
  # Runs the Slack bot that answers questions and builds dashboards.
  # Requires .env to be populated (copy from .env.example).
  # Lightdash must also be running for Phase 3 dashboard creation to work.
  #
  # Start: docker-compose up slack-bot
  # ─────────────────────────────────────────────────────────────────────────────
  slack-bot:
    build:
      context: ./bi_agent
      dockerfile: Dockerfile
    container_name: soundflow_slack_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DUCKDB_PATH: /data/soundflow.duckdb
      LIGHTDASH_BASE_URL: http://lightdash:8090
    volumes:
      - ./data:/data:ro
    depends_on:
      - lightdash

volumes:
  lightdash_db_data:
